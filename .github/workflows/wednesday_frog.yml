name: Wednesday Frog Sender

on:
  schedule:
    - cron: '0 7 * * 3' # 10:00 МСК
  workflow_dispatch:

jobs:
  send_frog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install aiogram requests httpx

      - name: Run frog script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          FRIEND_ID: ${{ secrets.FRIEND_ID }}
        run: python frog_bot.py